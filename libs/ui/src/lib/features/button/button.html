@if (isLink()) {
  <a
    role="link"
    [class]="className()"
    [class.tls-button--has-icon]="icon()"
    [href]="href()"
    [tabindex]="tabindex()"
    [attr.aria-disabled]="disabled()"
  >
    <ng-container [ngTemplateOutlet]="contentRef"></ng-container>
  </a>
} @else {
  <button
    role="button"
    [class]="className()"
    [class.tls-button--has-icon]="icon()"
    [type]="type()"
    [tabindex]="tabindex()"
    [disabled]="disabled()"
    [attr.aria-disabled]="disabled()"
  >
    <ng-container [ngTemplateOutlet]="contentRef"></ng-container>
  </button>
}

<!-- Content -->
<ng-template #contentRef>
  <span class="tls-button__content">
    @if (icon()) {
      @let iconValue = icon();
      @if (isIconString(iconValue)) {
        <tls-icon [iconSrc]="iconValue"></tls-icon>
      } @else {
        <ng-content></ng-content>
      }
    } @else {
      <ng-content></ng-content>
    }
  </span>
  <div class="tls-button__background"></div>
</ng-template>
